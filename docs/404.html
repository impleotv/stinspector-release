<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>STANAG4609 Inspector Downloads</title>
  <meta name="description" content="Latest STANAG4609 Inspector release downloads and release notes.">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Public Downloads</p>
        <div class="hero-artwork">
          <img src="./stinspector-splash-light.png" alt="STANAG4609 Inspector application splash screen">
        </div>
        <p class="lede">
          This page always points to the latest public release.
        </p>
        <p class="manual-link-row">
          <a class="manual-link" href="https://impleotv.com/content/stinspector/help/index.html" target="_blank" rel="noreferrer">Application Manual</a>
        </p>
        <p class="release-status" id="release-status">Loading latest release details...</p>
      </div>
      <div class="hero-footer">
        <dl class="release-meta" id="release-meta">
          <div>
            <dt>Version</dt>
            <dd>Loading...</dd>
          </div>
          <div>
            <dt>Released</dt>
            <dd>Loading...</dd>
          </div>
        </dl>
        <div class="hero-actions" id="hero-actions"></div>
        <div class="hero-links" id="hero-links"></div>
      </div>
    </header>

    <section class="changelog-panel">
      <details class="changelog-details" id="changelog-details">
        <summary>Latest changelog</summary>
        <div class="changelog-body" id="changelog-body">Loading changelog...</div>
      </details>
    </section>
  </div>

  <script src="./app.js" defer></script>
</body>
</html>
